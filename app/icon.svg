<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .frame { fill: #15150f; }
    .cube { fill: #2b4fd8; }
    @media (prefers-color-scheme: dark) {
      .frame { fill: #f2f1eb; }
      .cube { fill: #8b9eff; }
    }
  </style>
  <mask id="frame-gaps">
    <rect width="64" height="64" fill="#fff"/>
    <g stroke="#000" stroke-width="1.2">
      <path d="M32 1L32 14"/>
      <path d="M58.9 16.5L47.6 23"/>
      <path d="M58.9 47.5L47.6 41"/>
      <path d="M32 63L32 50"/>
      <path d="M5.1 47.5L16.4 41"/>
      <path d="M5.1 16.5L16.4 23"/>
    </g>
  </mask>
  <mask id="cube-gaps">
    <rect width="64" height="64" fill="#fff"/>
    <g stroke="#000" stroke-width="1.2">
      <path d="M32 32L20.3 25.3"/>
      <path d="M32 32L43.7 25.3"/>
      <path d="M32 32L32 45.5"/>
    </g>
  </mask>
  <!-- the frame: one flat tone, faces separated by hairline gaps -->
  <path class="frame" mask="url(#frame-gaps)" fill-rule="evenodd"
