  <!-- the mind: one flat blue, centered in the frame -->
  <path class="cube" mask="url(#cube-gaps)"
        d="M32 18.5L43.7 25.3L43.7 38.8L32 45.5L20.3 38.8L20.3 25.3L32 18.5Z"/>
</svg>
